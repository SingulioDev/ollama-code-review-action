name: Build Action

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Check if dist changed
        id: check-dist
        run: |
          if git diff --quiet dist/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit dist if changed
        if: steps.check-dist.outputs.changed == 'true' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git commit -m "chore: rebuild dist"
          git push

      - name: Verify dist is up to date (PRs)
        if: github.event_name == 'pull_request' && steps.check-dist.outputs.changed == 'true'
        run: |
          echo "::error::dist/ is out of date. Run 'bun run build' and commit the changes."
          exit 1
